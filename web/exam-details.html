<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Examination Details — UMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm"><div class="container"><a class="navbar-brand" href="dashboard.html">UMS</a><button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"><span class="navbar-toggler-icon"></span></button><div class="collapse navbar-collapse" id="navMenu"><ul class="navbar-nav me-auto mb-2 mb-lg-0"><li class="nav-item"><a class="nav-link" href="dashboard.html">Home</a></li><li class="nav-item"><a class="nav-link" href="exam-details.html">Examination</a></li><li class="nav-item"><a class="nav-link" href="#" id="db-logout">Logout</a></li></ul></div></div></nav>

    <main class="container py-5">
      <h2>Examination Details</h2>
      <form id="examForm" class="row g-3">
        <div class="col-md-6"><label class="form-label">Exam Name</label><input class="form-control" id="examName" required></div>
        <div class="col-md-6"><label class="form-label">Date</label><input type="date" class="form-control" id="examDate" required></div>
        <div class="col-md-6"><label class="form-label">Total Marks</label><input type="number" class="form-control" id="totalMarks" required></div>
        <div class="col-12"><button class="btn btn-primary" type="submit">Save Exam</button></div>
      </form>
      <div id="examStatus" class="mt-3"></div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
