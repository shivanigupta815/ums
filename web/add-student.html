  <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container-fluid px-4">
      <a class="navbar-brand" href="dashboard.html">UMS</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="add-student.html">Add Student</a></li>
          <li class="nav-item"><a class="nav-link" href="add-teacher.html">Add Teacher</a></li>
          <li class="nav-item"><a class="nav-link" href="student-details.html">Student Details</a></li>

        </ul>
      </div>
    </div>

  <main class="container py-5">
    <h4 class="mb-4">Add New Student</h4>

    <form id="studentForm" class="row g-3" novalidate>

      <!-- Row 1 -->
      <div class="col-md-6">
        <label class="form-label">Name <span class="text-danger">*</span></label>
        <input class="form-control" id="studentName" placeholder="Full name" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Father's Name</label>
        <input class="form-control" id="fatherName" placeholder="Father's full name">
      </div>

      <!-- Row 2 -->
      <div class="col-md-6">
        <label class="form-label">Roll Number <span class="text-danger">*</span></label>
        <input class="form-control" id="studentId" placeholder="e.g. 15331234" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Date of Birth</label>
        <input type="date" class="form-control" id="studentDob">
      </div>

      <!-- Row 3 -->
      <div class="col-md-6">
        <label class="form-label">Address</label>
        <input class="form-control" id="studentAddress" placeholder="Residential address">
      </div>
      <div class="col-md-6">
        <label class="form-label">Phone</label>
        <input type="tel" class="form-control" id="studentPhone" placeholder="10-digit mobile number">
      </div>

      <!-- Row 4 -->
      <div class="col-md-6">
        <label class="form-label">Email <span class="text-danger">*</span></label>
        <input type="email" class="form-control" id="studentEmail" placeholder="email@example.com" required>
      </div>
      <div class="col-md-3">
        <label class="form-label">Class X (%)</label>
        <input type="number" min="0" max="100" step="0.01" class="form-control" id="studentClassX" placeholder="e.g. 85.5">
      </div>
      <div class="col-md-3">
        <label class="form-label">Class XII (%)</label>
        <input type="number" min="0" max="100" step="0.01" class="form-control" id="studentClassXII" placeholder="e.g. 78.0">
      </div>

      <!-- Row 5 -->
      <div class="col-md-6">
        <label class="form-label">Aadhar Number</label>
        <input type="text" maxlength="12" class="form-control" id="studentAadhar" placeholder="12-digit Aadhar number">
      </div>
      <div class="col-md-6">
        <label class="form-label">Course <span class="text-danger">*</span></label>
        <select class="form-select" id="studentCourse" required>
          <option value="">-- Select Course --</option>
          <option>B.Tech</option>
          <option>BBA</option>
          <option>BCA</option>
          <option>Bsc</option>
          <option>Msc</option>
          <option>MBA</option>
          <option>MCA</option>
          <option>MCom</option>
          <option>MA</option>
          <option>BA</option>
        </select>
      </div>

      <!-- Row 6 -->
      <div class="col-md-6">
        <label class="form-label">Branch <span class="text-danger">*</span></label>
        <select class="form-select" id="department" required>
          <option value="">-- Select Branch --</option>
          <option>Computer Science</option>
          <option>Electronics</option>
          <option>Mechanical</option>
          <option>Civil</option>
          <option>IT</option>
          <option>B.C.A</option>
          <option>B.B.A</option>
          <option>B.COM</option>
          <option>B.A</option>
          <option>B.SC</option>
          <option>M.A</option>
          <option>M.SC</option>
          <option>M.COM</option>
        </select>
      </div>

      <!-- Buttons -->
      <div class="col-12 mt-2">
        <button class="btn btn-primary" type="submit">Save Student</button>
        <button class="btn btn-secondary ms-2" type="reset">Reset</button>
      </div>

    </form>

    <div id="studentStatus" class="mt-3"></div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="ums-confirm.js"></script>
  <script src="script.js"></script>
</body>
</html>
