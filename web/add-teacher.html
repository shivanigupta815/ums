<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Add Teacher — UMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
      <div class="container">
        <a class="navbar-brand" href="dashboard.html">UMS</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link" href="dashboard.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="add-student.html">Add Student</a></li>
            <li class="nav-item"><a class="nav-link active" href="add-teacher.html">Add Teacher</a></li>
            <li class="nav-item"><a class="nav-link" href="student-details.html">Student Details</a></li>
            <li class="nav-item"><a class="nav-link" href="teacher-details.html">Teacher Details</a></li>
            <li class="nav-item"><a class="nav-link" href="apply-leave.html">Record Leave</a></li>
            <li class="nav-item"><a class="nav-link" href="leave-types.html">Leave Types</a></li>
            <li class="nav-item"><a class="nav-link" href="leave-details.html">Leave Details</a></li>
            <li class="nav-item"><a class="nav-link" href="teacher-leave-quota.html">Leave Quota</a></li>
            <li class="nav-item"><a class="nav-link" href="fee-structure.html">Fee Structure</a></li>
            <li class="nav-item"><a class="nav-link" href="#" id="logoutButton">Logout</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-5">
      <h2 class="mb-4">Add New Teacher</h2>

      <form id="teacherForm" class="row g-3" novalidate>

        <!-- Row 1 -->
        <div class="col-md-6">
          <label class="form-label">Name <span class="text-danger">*</span></label>
          <input class="form-control" id="teacherName" placeholder="Full name" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Father's Name</label>
          <input class="form-control" id="fatherName" placeholder="Father's full name">
        </div>

        <!-- Row 2 -->
        <div class="col-md-6">
          <label class="form-label">Employee ID <span class="text-danger">*</span></label>
          <input class="form-control" id="teacherId" placeholder="e.g. 1017403" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Date of Birth</label>
          <input type="date" class="form-control" id="teacherDob">
        </div>

        <!-- Row 3 -->
        <div class="col-md-6">
          <label class="form-label">Address</label>
          <input class="form-control" id="teacherAddress" placeholder="Residential address">
        </div>
        <div class="col-md-6">
          <label class="form-label">Phone</label>
          <input type="tel" class="form-control" id="teacherPhone" placeholder="10-digit mobile number">
        </div>

        <!-- Row 4 — Email optional -->
        <div class="col-md-6">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="teacherEmail" placeholder="email@example.com">
        </div>
        <div class="col-md-6">
          <label class="form-label">Aadhar Number</label>
          <input type="text" maxlength="12" class="form-control" id="teacherAadhar" placeholder="12-digit Aadhar number">
        </div>

        <!-- Row 5 -->
        <div class="col-md-6">
          <label class="form-label">Qualification</label>
          <select class="form-select" id="teacherEducation">
            <option value="">-- Select --</option>
            <option>B.Tech</option>
            <option>P.hd</option>
            <option>BBA</option>
            <option>BCA</option>
            <option>Bsc</option>
            <option>Msc</option>
            <option>MBA</option>
            <option>MCA</option>
            <option>MCom</option>
            <option>MA</option>
            <option>BA</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Department <span class="text-danger">*</span></label>
          <select class="form-select" id="department" required>
            <option value="">-- Select Department --</option>
            <option>B.C.A</option>
            <option>B.B.A</option>
            <option>B.COM</option>
            <option>B.A</option>
            <option>B.SC</option>
            <option>M.A</option>
            <option>M.SC</option>
            <option>M.COM</option>
          </select>
        </div>

        <!-- Row 6 — Staff Type + Gender -->
        <div class="col-md-6">
          <label class="form-label">Staff Type <span class="text-danger">*</span></label>
          <select class="form-select" id="staffType" required>
            <option value="">-- Select Staff Type --</option>
            <option value="Teaching Staff">Teaching Staff</option>
            <option value="Non-Teaching Staff">Non-Teaching Staff</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Gender <span class="text-danger">*</span></label>
          <select class="form-select" id="gender" required>
            <option value="">-- Select Gender --</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <!-- Row 7 — Marital Status -->
        <div class="col-md-6">
          <label class="form-label">Marital Status <span class="text-danger">*</span></label>
          <select class="form-select" id="maritalStatus" required>
            <option value="">-- Select Marital Status --</option>
            <option value="Single">Single</option>
            <option value="Married">Married</option>
            <option value="Divorced">Divorced</option>
            <option value="Widowed">Widowed</option>
          </select>
        </div>

        <!-- Submit -->
        <div class="col-12 mt-2">
          <button class="btn btn-primary" type="submit">Save Teacher</button>
          <button class="btn btn-secondary ms-2" type="reset">Reset</button>
        </div>

      </form>

      <div id="teacherStatus" class="mt-3"></div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>

    <script>
      $('#teacherForm').off('submit').on('submit', async function (e) {
        e.preventDefault();
        e.stopImmediatePropagation();
        const teacher = {
          name:          $('#teacherName').val().trim(),
          fname:         $('#fatherName').val().trim()    || null,
          empId:         $('#teacherId').val().trim(),
          dob:           $('#teacherDob').val()            || null,
          address:       $('#teacherAddress').val().trim() || null,
          phone:         $('#teacherPhone').val().trim()   || null,
          email:         $('#teacherEmail').val().trim()   || null,
          class_x:       null,
          class_xii:     null,
          aadhar:        $('#teacherAadhar').val().trim()  || null,
          education:     $('#teacherEducation').val()      || null,
          department:    $('#department').val(),
          staffType:     $('#staffType').val(),
          gender:        $('#gender').val(),
          maritalStatus: $('#maritalStatus').val(),
        };

        if (!teacher.name) {
          $('#teacherStatus').html('<div class="alert alert-danger">Name is required.</div>'); return;
        }
        if (!teacher.empId) {
          $('#teacherStatus').html('<div class="alert alert-danger">Employee ID is required.</div>'); return;
        }
        if (!teacher.department) {
          $('#teacherStatus').html('<div class="alert alert-danger">Department is required.</div>'); return;
        }
        if (!teacher.staffType) {
          $('#teacherStatus').html('<div class="alert alert-danger">Staff Type is required.</div>'); return;
        }
        if (!teacher.gender) {
          $('#teacherStatus').html('<div class="alert alert-danger">Gender is required.</div>'); return;
        }
        if (!teacher.maritalStatus) {
          $('#teacherStatus').html('<div class="alert alert-danger">Marital Status is required.</div>'); return;
        }

        try {
          const res  = await fetch('http://localhost:3001/api/teachers', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify(teacher)
          });
          const data = await res.json();
          if (data.success) {
            $('#teacherStatus').html('<div class="alert alert-success">✅ Teacher added successfully.</div>');
            document.getElementById('teacherForm').reset();
          } else {
            $('#teacherStatus').html(`<div class="alert alert-danger">❌ ${data.error || 'Failed to add teacher.'}</div>`);
          }
        } catch (err) {
          $('#teacherStatus').html(`<div class="alert alert-danger">❌ Server error: ${err.message}</div>`);
        }
      });
    </script>
  </body>
</html>
