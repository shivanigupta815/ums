<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>University Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div id="splash-screen" class="d-flex align-items-center justify-content-center vh-100 bg-gradient">
      <div class="text-center text-white">
        <h1 class="display-4">Welcome to University Management System</h1>
        <p class="lead">Loading application, please wait...</p>
        <div class="progress w-75 mx-auto" role="progressbar" aria-label="Loading progress">
          <div id="splash-progress" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%"></div>
        </div>
      </div>
    </div>

    <div id="login-screen" class="d-none">
      <div class="container-fluid py-5">
        <div class="row justify-content-center align-items-center">
          <div class="col-12 col-lg-10">
            <div class="card shadow-lg border-0 login-horizontal-card">
              <div class="card-body d-flex flex-column flex-lg-row align-items-center justify-content-between gap-3">
                <div class="login-info text-center text-lg-start">
                  <h4 class="mb-2">University Management System</h4>
                  <p class="mb-0">Quick, secure access to your admin dashboard</p>
                </div>
                <form id="login-form" class="d-flex flex-column flex-md-row align-items-center gap-2 w-100">
                  <div class="flex-fill">
                    <input type="text" class="form-control form-control-lg" id="username" placeholder="Username" required>
                  </div>
                  <div class="flex-fill">
                    <input type="password" class="form-control form-control-lg" id="password" placeholder="Password" required>
                  </div>
                  <button type="submit" class="btn btn-primary btn-lg px-5">Sign In</button>
                </form>
                <div id="login-alert" class="alert alert-danger mt-3 d-none w-100" role="alert"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
